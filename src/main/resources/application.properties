# Application
spring.application.name=thermal-inspection-backend
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/transformer_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Jackson JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# FastAPI Microservice Configuration
fastapi.service.url=http://localhost:8000
fastapi.service.detect-endpoint=/api/v1/detect
fastapi.service.timeout=300000

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true

# OAuth2 Resource Server (Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/transformer-realm

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
info.app.name=thermal-inspection-backend
info.app.version=1.0.0

# Logging
logging.level.com.chamikara=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# AWS S3 Configuration
# IMPORTANT: Do NOT commit real credentials. Use Environment Variables in production:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, AWS_S3_BUCKET_NAME
aws.accessKeyId=${AWS_ACCESS_KEY_ID:CHANGE_ME}
aws.secretKey=${AWS_SECRET_ACCESS_KEY:CHANGE_ME}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucketName=${AWS_S3_BUCKET_NAME:CHANGE_ME}
